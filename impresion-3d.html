<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rincon-Z - Impresión 3D</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
      background:#0a0a0f; color:#f0f0f5; line-height:1.6; overflow-x:hidden;
    }
    ::-webkit-scrollbar { width:8px; }
    ::-webkit-scrollbar-track { background:#0a0a0f; }
    ::-webkit-scrollbar-thumb { background:#3b3b5c; border-radius:4px; }

    nav {
      position:fixed; top:0; width:100%; padding:1.2rem 2rem;
      display:flex; justify-content:space-between; align-items:center;
      z-index:1000; background:rgba(10,10,15,0.85); backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,0.06);
    }
    .logo {
      font-size:1.6rem; font-weight:800; text-decoration:none;
      background:linear-gradient(135deg,#f59e0b,#f97316);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .nav-links { display:flex; gap:2rem; list-style:none; align-items:center; }
    .nav-links a {
      color:#b0b0c8; text-decoration:none; font-size:0.9rem; font-weight:500;
      transition:color 0.3s;
    }
    .nav-links a:hover { color:#fff; }
    .nav-back { color:#f59e0b !important; font-weight:600 !important; }
    .hamburger {
      display:none; flex-direction:column; gap:5px; cursor:pointer;
      background:none; border:none; padding:4px; z-index:1001;
    }
    .hamburger span { width:26px; height:2.5px; background:#f0f0f5; border-radius:2px; transition:all 0.3s; }
    .hamburger.open span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
    .hamburger.open span:nth-child(2) { opacity:0; }
    .hamburger.open span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }

    .hero {
      min-height:100vh; display:flex; flex-direction:column;
      justify-content:center; align-items:center; text-align:center;
      padding:6rem 2rem 2rem; position:relative;
      background: radial-gradient(ellipse at 20% 50%, rgba(245,158,11,0.1), transparent 60%), radial-gradient(ellipse at 80% 50%, rgba(249,115,22,0.08), transparent 60%);
    }
    .hero::before { content:''; position:absolute; inset:0; background:var(--hero-bg) center/cover; opacity:0.15; z-index:0; }
    .hero>* { position:relative; z-index:1; }
    .hero-badge {
      display:inline-block; background:rgba(245,158,11,0.12);
      border:1px solid rgba(245,158,11,0.2); padding:0.4rem 1.2rem;
      border-radius:50px; font-size:0.8rem; color:#f59e0b;
      margin-bottom:1.5rem; letter-spacing:1px;
    }
    .hero h1 { font-size:clamp(2.5rem,7vw,5rem); font-weight:800; line-height:1.1; margin-bottom:1.2rem; }
    .hero h1 span { background:linear-gradient(135deg,#f59e0b,#f97316); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .hero p { font-size:1.15rem; color:#9090aa; max-width:600px; margin-bottom:2rem; }
    .hero-btns { display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; }
    .btn {
      padding:0.85rem 2.2rem; border-radius:50px; text-decoration:none;
      font-weight:600; font-size:0.95rem; transition:all 0.3s;
      display:inline-flex; align-items:center; gap:0.5rem;
    }
    .btn-primary { background:linear-gradient(135deg,#f59e0b,#f97316); color:#fff; box-shadow:0 4px 25px rgba(245,158,11,0.3); }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 35px rgba(245,158,11,0.45); }
    .btn-outline { border:1.5px solid rgba(255,255,255,0.15); color:#f0f0f5; }
    .btn-outline:hover { border-color:#f59e0b; background:rgba(245,158,11,0.08); }
    .btn-wa { background:#25d366; color:#fff; }
    .btn-wa:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(37,211,102,0.35); }

    section { padding:6rem 2rem; max-width:1200px; margin:0 auto; }
    .section-tag { display:inline-block; font-size:0.75rem; text-transform:uppercase; letter-spacing:2px; color:#f59e0b; margin-bottom:0.6rem; font-weight:600; }
    .section-title { font-size:clamp(2rem,4vw,3rem); font-weight:700; margin-bottom:1rem; }
    .section-desc { color:#9090aa; max-width:600px; margin-bottom:3rem; }

    .services-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.5rem; }
    .service-item { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:18px; padding:2rem 1.8rem; transition:all 0.3s; }
    .service-item:hover { background:rgba(255,255,255,0.04); border-color:rgba(245,158,11,0.2); transform:translateY(-3px); }
    .service-item .icon { font-size:2rem; margin-bottom:1rem; }
    .service-item h4 { font-size:1.1rem; margin-bottom:0.5rem; }
    .service-item p { font-size:0.85rem; color:#8080a0; }

    .steps-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1.5rem; counter-reset:step; }
    .step-item { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:18px; padding:2rem 1.8rem; text-align:center; position:relative; transition:all 0.3s; }
    .step-item:hover { border-color:rgba(245,158,11,0.2); transform:translateY(-3px); }
    .step-item .step-num { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#f59e0b,#f97316); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1.2rem; margin:0 auto 1rem; }
    .step-item .icon { font-size:2rem; margin-bottom:0.8rem; }
    .step-item h4 { font-size:1.05rem; margin-bottom:0.4rem; }
    .step-item p { font-size:0.85rem; color:#8080a0; }

    .materials-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1.2rem; }
    .material-card { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:16px; padding:1.5rem; transition:all 0.3s; }
    .material-card:hover { border-color:rgba(245,158,11,0.2); transform:translateY(-2px); }
    .material-card .mat-icon { font-size:1.8rem; margin-bottom:0.5rem; }
    .material-card h4 { font-size:1rem; margin-bottom:0.3rem; }
    .material-card .mat-props { font-size:0.75rem; color:#f59e0b; margin-bottom:0.4rem; }
    .material-card p { font-size:0.82rem; color:#8080a0; }

    .projects-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:1.5rem; }
    .project-card { background:linear-gradient(145deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.06); border-radius:20px; padding:2rem 1.8rem; transition:all 0.3s; }
    .project-card:hover { border-color:rgba(255,255,255,0.12); transform:translateY(-4px); }
    .project-card .icon { font-size:2.4rem; margin-bottom:0.8rem; }
    .project-card h4 { font-size:1.1rem; margin-bottom:0.5rem; }
    .project-card p { font-size:0.85rem; color:#8080a0; margin-bottom:1rem; }
    .project-badge { display:inline-block; font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:1px; padding:0.25rem 0.8rem; border-radius:50px; margin-bottom:1rem; background:rgba(245,158,11,0.12); color:#f59e0b; border:1px solid rgba(245,158,11,0.2); }
    .project-status { font-size:0.75rem; display:flex; align-items:center; gap:0.4rem; }
    .project-status .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
    .project-status .dot.completed { background:#34d399; }
    .project-status .dot.progress { background:#f59e0b; }

    .faq-grid { max-width:800px; margin:0 auto; }
    .faq-item { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:14px; margin-bottom:0.8rem; overflow:hidden; transition:all 0.3s; }
    .faq-item:hover { border-color:rgba(245,158,11,0.15); }
    .faq-q { padding:1.2rem 1.5rem; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-weight:600; font-size:0.95rem; }
    .faq-q .arrow { font-size:1.1rem; transition:transform 0.3s; color:#f59e0b; }
    .faq-item.open .faq-q .arrow { transform:rotate(180deg); }
    .faq-a { max-height:0; padding:0 1.5rem; overflow:hidden; transition:all 0.35s; color:#8080a0; font-size:0.88rem; line-height:1.6; }
    .faq-item.open .faq-a { max-height:300px; padding:0 1.5rem 1.2rem; }

    .cta-section { text-align:center; background:radial-gradient(ellipse at center,rgba(245,158,11,0.06),transparent); padding:6rem 2rem; border-radius:32px; border:1px solid rgba(255,255,255,0.05); max-width:900px; margin:0 auto 2rem; }
    .cta-section h2 { font-size:clamp(1.8rem,3vw,2.6rem); margin-bottom:1rem; }
    .cta-section p { color:#9090aa; margin-bottom:2rem; }

    footer { text-align:center; padding:2rem; color:#505070; font-size:0.8rem; border-top:1px solid rgba(255,255,255,0.04); }

    .chat-btn { position:fixed; bottom:1.8rem; right:1.8rem; width:58px; height:58px; border-radius:50%; background:linear-gradient(135deg,#f59e0b,#f97316); border:none; color:#fff; font-size:1.5rem; cursor:pointer; z-index:999; box-shadow:0 6px 30px rgba(245,158,11,0.4); transition:all 0.3s; display:flex; align-items:center; justify-content:center; }
    .chat-btn:hover { transform:scale(1.1); box-shadow:0 8px 40px rgba(245,158,11,0.55); }
    .chat-btn svg { width:26px; height:26px; fill:currentColor; }
    .chat-box { position:fixed; bottom:5.5rem; right:1.8rem; width:360px; max-width:calc(100vw - 3.6rem); max-height:520px; background:#12121c; border:1px solid rgba(255,255,255,0.08); border-radius:20px; display:none; flex-direction:column; z-index:998; box-shadow:0 20px 60px rgba(0,0,0,0.6); overflow:hidden; animation:slideUp 0.35s ease; }
    .chat-box.open { display:flex; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .chat-header { padding:1rem 1.2rem; background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:space-between; }
    .chat-header-info { display:flex; align-items:center; gap:0.7rem; }
    .chat-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#f59e0b,#f97316); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.9rem; }
    .chat-header h4 { font-size:0.95rem; font-weight:600; }
    .chat-header .status { font-size:0.7rem; color:#25d366; }
    .chat-close { background:none; border:none; color:#606080; font-size:1.3rem; cursor:pointer; }
    .chat-close:hover { color:#fff; }
    .chat-messages { flex:1; padding:1rem 1.2rem; overflow-y:auto; display:flex; flex-direction:column; gap:0.6rem; min-height:200px; max-height:320px; }
    .msg { max-width:85%; padding:0.7rem 1rem; border-radius:14px; font-size:0.88rem; line-height:1.4; animation:msgIn 0.3s ease; }
    @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg.bot { background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.15); align-self:flex-start; border-bottom-left-radius:4px; }
    .msg.user { background:rgba(249,115,22,0.15); border:1px solid rgba(249,115,22,0.15); align-self:flex-end; border-bottom-right-radius:4px; }
    .chat-input-area { display:flex; gap:0.5rem; padding:0.8rem 1rem; border-top:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); }
    .chat-input-area input { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:0.7rem 1rem; color:#f0f0f5; font-size:0.9rem; outline:none; }
    .chat-input-area input:focus { border-color:#f59e0b; }
    .chat-input-area input::placeholder { color:#505070; }
    .chat-send { width:42px; height:42px; border-radius:12px; background:linear-gradient(135deg,#f59e0b,#f97316); border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.3s; flex-shrink:0; }
    .chat-send:hover { transform:scale(1.06); box-shadow:0 4px 20px rgba(245,158,11,0.35); }
    .chat-send svg { width:18px; height:18px; fill:currentColor; }
    .typing { display:flex; gap:4px; padding:0.7rem 1rem; background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.12); border-radius:14px; align-self:flex-start; border-bottom-left-radius:4px; }
    .typing span { width:7px; height:7px; background:#f59e0b; border-radius:50%; animation:typingBounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay:0.2s; }
    .typing span:nth-child(3) { animation-delay:0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }
    .toast { position:fixed; bottom:6rem; right:6rem; background:#12121c; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:0.8rem 1.2rem; font-size:0.85rem; color:#f0f0f5; box-shadow:0 10px 40px rgba(0,0,0,0.5); opacity:0; transform:translateY(10px); transition:all 0.35s; z-index:997; pointer-events:none; }
    .toast.show { opacity:1; transform:translateY(0); }

    .quote-form { max-width:680px; margin:0 auto; background:#12121c; border:1px solid rgba(255,255,255,0.06); border-radius:24px; padding:2.5rem; }
    .quote-form .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .quote-form .field { margin-bottom:1.2rem; }
    .quote-form label { display:block; font-size:0.8rem; font-weight:600; color:#a0a0b8; margin-bottom:0.4rem; }
    .quote-form input, .quote-form select, .quote-form textarea { width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:0.8rem 1rem; color:#f0f0f5; font-size:0.9rem; font-family:inherit; outline:none; transition:border-color 0.3s; }
    .quote-form input:focus, .quote-form select:focus, .quote-form textarea:focus { border-color:#f59e0b; }
    .quote-form select option { background:#12121c; color:#f0f0f5; }
    .quote-form textarea { min-height:100px; resize:vertical; }
    .quote-form .btn-submit { width:100%; padding:0.9rem; border:none; border-radius:12px; background:linear-gradient(135deg,#f59e0b,#f97316); color:#fff; font-weight:700; font-size:1rem; cursor:pointer; transition:all 0.3s; }
    .quote-form .btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(245,158,11,0.35); }
    .quote-form .btn-submit:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .quote-success { display:none; text-align:center; padding:2rem; color:#34d399; }
    .quote-success.show { display:block; }

    @media (max-width:768px) {
      nav { padding:1rem 1.2rem; }
      .hamburger { display:flex; }
      .nav-links {
        position:fixed; top:0; right:-100%; width:75%; max-width:320px;
        height:100vh; background:rgba(12,12,20,0.98); backdrop-filter:blur(20px);
        flex-direction:column; padding:5rem 2rem 2rem; gap:0.5rem;
        border-left:1px solid rgba(255,255,255,0.06);
        transition:right 0.35s ease; z-index:1000;
      }
      .nav-links.open { right:0; }
      .nav-links a { font-size:1.05rem; padding:0.7rem 0; display:block; }
      .hero { padding:5rem 1.2rem 2rem; }
      .hero h1 { font-size:clamp(2rem,7vw,3rem); }
      section { padding:3rem 1.2rem; }
      .section-title { font-size:clamp(1.5rem,5vw,2rem); }
      .chat-box { right:0.5rem; bottom:5rem; width:calc(100vw - 1rem); border-radius:16px; }
      .toast { right:0.5rem; bottom:5.5rem; }
      .quote-form { padding:1.5rem; }
      .quote-form .form-row { grid-template-columns:1fr; }
      .faq-q { padding:1rem 1.2rem; font-size:0.88rem; }
      .faq-item.open .faq-a { padding:0 1.2rem 1rem; }
      .step-item { padding:1.5rem 1.2rem; }
      .projects-grid { grid-template-columns:1fr; }
      .materials-grid { grid-template-columns:1fr; }
      .services-grid { grid-template-columns:1fr; }
      .cta-section { padding:3rem 1.5rem; }
      .chat-btn { bottom:1rem; right:1rem; width:52px; height:52px; }
    }
    @media (max-width:480px) {
      .hero h1 { font-size:1.6rem; }
      .hero p { font-size:0.95rem; }
      .steps-grid { grid-template-columns:1fr; }
      .section-desc { font-size:0.88rem; }
    }
  </style>
</head>

    function initChat() {
      const chatBtn = document.getElementById('chatBtn');
      const chatBox = document.getElementById('chatBox');
      const chatClose = document.getElementById('chatClose');
      const chatMessages = document.getElementById('chatMessages');
      const chatInput = document.getElementById('chatInput');
      const chatSend = document.getElementById('chatSend');
      const chatIcon = document.getElementById('chatIcon');
      const toast = document.getElementById('toast');
      let chatOpen = false;

      function toggleChat(open) {
        chatOpen = open !== undefined ? open : !chatOpen;
        chatBox.classList.toggle('open', chatOpen);
        if (chatOpen) { chatInput.focus(); chatIcon.innerHTML = '<path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>'; }
        else { chatIcon.innerHTML = '<path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>'; }
      }
      chatBtn.addEventListener('click', () => toggleChat());
      chatClose.addEventListener('click', () => toggleChat(false));

      function showToast(text, duration) { toast.textContent = text; toast.classList.add('show'); clearTimeout(toast._timer); toast._timer = setTimeout(() => toast.classList.remove('show'), duration || 3000); }
      function addMessage(text, type) { const div = document.createElement('div'); div.className = 'msg ' + type; div.innerHTML = text; chatMessages.appendChild(div); chatMessages.scrollTop = chatMessages.scrollHeight; }
      function showTyping() { const div = document.createElement('div'); div.className = 'typing'; div.id = 'typingIndicator'; div.innerHTML = '<span></span><span></span><span></span>'; chatMessages.appendChild(div); chatMessages.scrollTop = chatMessages.scrollHeight; }
      function hideTyping() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }

      function getBotResponse(msg) {
        const l = msg.toLowerCase();
        if (l.includes('precio')||l.includes('costo')||l.includes('cotizar')) return 'Los precios var\u00edan seg\u00fan material, tama\u00f1o y complejidad. Para darte una cotizaci\u00f3n precisa, \u00bfpodr\u00edas contarme m\u00e1s detalles de la pieza? O mejor, \u00a1escr\u00edbenos por WhatsApp!';
        if (l.includes('pla')||l.includes('petg')||l.includes('abs')||l.includes('tpu')||l.includes('filamento')||l.includes('fdm')) return 'Trabajamos con PLA+, PETG, ABS, TPU y materiales compuestos. La FDM es ideal para prototipos funcionales y piezas mec\u00e1nicas. \u00bfQu\u00e9 material te interesa?';
        if (l.includes('resina')) return 'La impresi\u00f3n en resina ofrece detalles finos y acabado suave. Perfecta para miniaturas, joyer\u00eda, odontolog\u00eda y modelos decorativos. \u00bfTienes el archivo STL?';
        if (l.includes('whatsapp')||l.includes('contacto')) return 'Puedes escribirnos directo por WhatsApp y te respondemos en minutos. \uD83D\uDC49 <a href="https://wa.me/' + (getConfig().wa_number || DEFAULTS.wa_number) + '" target="_blank" style="color:#f59e0b;">Abrir WhatsApp</a>';
        if (l.includes('gracias')||l.includes('bye')) return '\u00a1De nada! Quedamos atentos a cualquier duda. No olvides que puedes contactarnos por WhatsApp cuando gustes. \uD83D\uDE0A';
        if (l.includes('hola')||l.includes('buenas')) return '\u00a1Hola de nuevo! \uD83D\uDE0A Cu\u00e9ntame, \u00bfqu\u00e9 tipo de pieza o proyecto en 3D necesitas? \u00bfFDM o resina?';
        return 'Gracias por tu mensaje. Para ayudarte mejor, \u00bfpodr\u00edas indicarme qu\u00e9 tipo de pieza necesitas? \u00bfFDM (prototipos funcionales) o resina (alta definici\u00f3n)? O si prefieres, \u00a1escr\u00edbenos por WhatsApp!';
      }

      function handleSend() {
        const text = chatInput.value.trim(); if (!text) return;
        addMessage(text, 'user'); chatInput.value = ''; showTyping();
        setTimeout(() => { hideTyping(); addMessage(getBotResponse(text), 'bot'); }, Math.min(600 + text.length * 20, 1800));
      }
      chatSend.addEventListener('click', handleSend);
      chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

      let toastShown = false; let awayTimer = null;
      function resetAwayTimer() {
        if (toastShown) return; clearTimeout(awayTimer);
        awayTimer = setTimeout(function() { if (!chatOpen) { showToast('\uD83D\uDCAC \u00bfNecesitas ayuda con tu impresi\u00f3n 3D?'); toastShown = true; } }, 30000);
      }
      document.addEventListener('mousemove', resetAwayTimer); document.addEventListener('keydown', resetAwayTimer); resetAwayTimer();
      chatBtn.addEventListener('click', function() { toastShown = false; });
    }

    function initQuote() {
      document.getElementById('qf_submit').addEventListener('click', function() {
        const name = document.getElementById('qf_name').value.trim();
        const email = document.getElementById('qf_email').value.trim();
        const desc = document.getElementById('qf_desc').value.trim();
        if (!name || !email || !desc) { alert('Completa nombre, correo y descripci\u00f3n.'); return; }
        const quote = { id: Date.now(), name, email, phone: document.getElementById('qf_phone').value.trim(), service: '3d', desc, date: new Date().toISOString(), status: 'new' };
        const existing = JSON.parse(localStorage.getItem('babe_quotes') || '[]');
        existing.unshift(quote);
        localStorage.setItem('babe_quotes', JSON.stringify(existing));
        localStorage.setItem('babe_quotes_updated', Date.now().toString());
        document.getElementById('qf_submit').style.display = 'none';
        document.getElementById('qf_success').classList.add('show');
      });
    }

    function initUI() {
      document.querySelectorAll('a[href^="#"]').forEach(function(a) {
        a.addEventListener('click', function(e) { const t = document.querySelector(this.getAttribute('href')); if (t) { e.preventDefault(); t.scrollIntoView({ behavior: 'smooth', block: 'start' }); } });
      });
      var ham = document.getElementById('hamburger');
      var navL = document.getElementById('navLinks');
      if (ham && navL) {
        ham.addEventListener('click', function() {
          ham.classList.toggle('open');
          navL.classList.toggle('open');
          document.body.style.overflow = navL.classList.contains('open') ? 'hidden' : '';
        });
        navL.querySelectorAll('a').forEach(function(a) {
          a.addEventListener('click', function() { ham.classList.remove('open'); navL.classList.remove('open'); document.body.style.overflow = ''; });
        });
      }
    }

    render();
  </script>
</body>
</html>
